<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Expense Tracker</h1>
        
        <div class="summary">
            <h2>Total Spent: ₹<span id="total-amount">0.00</span></h2>
        </div>
        
        <form id="expense-form">
            <input type="text" id="expense-name" placeholder="What did you buy?" required>
            <input type="number" id="expense-amount" placeholder="Amount (₹)" step="0.01" required>
            <select id="expense-category">
                <option value="Food">Food & Dining</option>
                <option value="Transport">Transportation</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Academics">Academics</option>
                <option value="Other">Other</option>
            </select>
            <button type="submit">Add Expense</button>
        </form>

        <div class="expense-list">
            <h3>Recent Expenses</h3>
            <ul id="expense-items">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
